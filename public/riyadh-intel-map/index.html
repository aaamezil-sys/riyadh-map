<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><!-- v1.1 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyadh Intelligence Platform — Vision 2030 Intel Map | Ahmed Mezil</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-rtl-text/v0.3.0/mapbox-gl-rtl-text.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--surface:rgba(12,12,12,0.92);
  --green:#00E87A;--green-dim:rgba(0,232,122,0.10);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#FFFFFF;--muted:#888;--dim:#444;
  --sports:#F59E0B;--hospitality:#38BDF8;--culture:#E879F9;
  --transport:#34D399;--realestate:#FB923C;--energy:#EF4444;
}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#map{position:absolute;inset:0}

/* ── HEADER ── */
#header{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding:14px 22px 0;
  background:linear-gradient(to bottom,rgba(10,10,10,0.98) 60%,transparent);
  pointer-events:none;
}
.back-link{font-size:10px;font-weight:400;color:var(--dim);text-decoration:none;pointer-events:all;display:inline-flex;align-items:center;gap:4px;transition:color 0.15s;margin-bottom:4px;letter-spacing:0.02em}
.back-link:hover{color:var(--green)}
.brand{font-weight:800;font-size:20px;line-height:1;color:#fff;letter-spacing:-0.02em}
.brand em{color:var(--green);font-style:normal}

/* ── STATS BAR ── */
#statsbar{
  position:absolute;top:70px;left:22px;right:22px;z-index:20;
  display:flex;gap:0;pointer-events:none;
}
.sblock{display:flex;flex-direction:column;gap:1px;padding-right:20px;margin-right:20px;border-right:1px solid var(--border)}
.sblock:last-child{border-right:none}
.sval{font-weight:700;font-size:16px;color:#fff}
.sval.green{color:var(--green)}
.slabel{font-size:9px;font-weight:400;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase}

/* ── FILTERS ── */
#filters{position:absolute;top:108px;left:22px;z-index:20;display:flex;flex-direction:column;gap:3px}
.filter-label{display:none}
#filter-expand{
  display:none;align-items:center;gap:6px;padding:7px 12px;margin-top:4px;
  background:rgba(10,10,10,0.84);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;
  color:var(--muted);backdrop-filter:blur(12px);white-space:nowrap;transition:border-color 0.15s,color 0.15s;
}
#filter-expand:hover{color:#fff;border-color:var(--border2)}
#filter-expand .fe-arrow{font-size:8px;margin-left:4px;transition:transform 0.2s}
#filters:not(.collapsed) #filter-expand{display:none}
#filters.collapsed .filter-btn[data-sector]:not([data-sector="all"]){display:none}
#filters.collapsed #list-toggle{display:none}
.filter-btn{
  display:flex;align-items:center;gap:8px;padding:6px 11px;
  background:rgba(10,10,10,0.84);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;
  color:var(--muted);transition:border-color 0.15s,color 0.15s;
  backdrop-filter:blur(12px);white-space:nowrap;
}
.filter-btn:hover{color:#fff;border-color:var(--border2)}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fcount{margin-left:auto;padding-left:12px;font-size:10px;opacity:0.35}

/* ── LIST VIEW TOGGLE ── */
#list-toggle{
  display:flex;align-items:center;gap:6px;padding:6px 11px;margin-top:4px;
  background:rgba(10,10,10,0.84);border:1px solid var(--green);border-radius:4px;
  cursor:pointer;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;
  color:var(--green);backdrop-filter:blur(12px);white-space:nowrap;transition:background 0.15s;
}
#list-toggle:hover{background:rgba(0,232,122,0.08)}
#list-toggle .lt-icon{font-size:14px;line-height:1}

/* ── LIST PANEL ── */
#list-panel{
  position:fixed;top:0;left:0;bottom:0;width:360px;z-index:200;
  background:rgba(8,8,8,0.96);backdrop-filter:blur(24px);
  border-right:1px solid var(--border2);
  transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#list-panel.open{transform:translateX(0)}
.lp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.lp-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:0.02em}
.lp-count{font-size:11px;color:var(--muted);font-weight:500}
.lp-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);color:#fff;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;
}
.lp-close:hover{background:rgba(255,255,255,0.15)}
.lp-search{
  margin:12px 16px;padding:9px 14px;border-radius:6px;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);color:#fff;font-family:'Poppins',sans-serif;
  font-size:13px;outline:none;transition:border-color 0.15s;
}
.lp-search:focus{border-color:var(--green)}
.lp-search::placeholder{color:var(--dim)}
.lp-body{flex:1;overflow-y:auto;padding:0 0 20px}
.lp-sector-group{margin-top:8px}
.lp-sector-hdr{
  position:sticky;top:0;padding:8px 20px;font-size:9px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;background:rgba(8,8,8,0.95);
  border-bottom:1px solid rgba(255,255,255,0.04);z-index:1;
}
.lp-item{
  display:flex;align-items:center;gap:12px;padding:11px 20px;
  cursor:pointer;transition:background 0.12s;border-bottom:1px solid rgba(255,255,255,0.03);
}
.lp-item:hover{background:rgba(255,255,255,0.04)}
.lp-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lp-item-info{flex:1;min-width:0}
.lp-item-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lp-item-meta{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lp-item-val{font-size:11px;font-weight:700;color:var(--green);flex-shrink:0;text-align:right}

/* ── POPUP ── */
.mapboxgl-popup{max-width:330px!important}
.mapboxgl-popup-content{
  background:rgba(10,10,10,0.98)!important;border:1px solid rgba(255,255,255,0.1)!important;
  border-radius:10px!important;padding:0!important;
  box-shadow:0 28px 70px rgba(0,0,0,0.9),0 0 20px rgba(0,232,122,0.08)!important;
  backdrop-filter:blur(24px);overflow:hidden;
}
.mapboxgl-popup-tip{display:none!important}
.mapboxgl-popup-close-button{color:#fff!important;font-size:18px!important;padding:0!important;background:rgba(255,255,255,0.1)!important;z-index:2;position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;display:flex!important;align-items:center;justify-content:center;line-height:1;transition:background 0.15s}
.mapboxgl-popup-close-button:hover{color:#fff!important;background:rgba(255,255,255,0.2)!important}

/* POPUP INTERNALS */
.p-img-wrap{position:relative;width:100%;height:140px;overflow:hidden;background:#111}
.p-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
.p-img:hover{transform:scale(1.04)}
.p-img-fallback{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:32px;
}
.p-img-overlay{
  position:absolute;bottom:0;left:0;right:0;height:50%;
  background:linear-gradient(to top,rgba(10,10,10,1),transparent);
}
.ptag{padding:7px 14px;font-size:8px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase}
.pbody{padding:2px 14px 14px}
.pname{font-weight:700;font-size:15px;line-height:1.3;color:#fff;margin-bottom:8px}
.phr{height:1px;background:var(--border);margin-bottom:9px}

/* insight block */
.p-insight{padding:8px 11px;border-left:2px solid;font-size:10px;font-weight:400;line-height:1.55;margin-bottom:8px}

.pmeta{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-bottom:10px}
.pm{display:flex;flex-direction:column;gap:1px}
.pmk{font-size:8px;font-weight:400;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
.pmv{font-size:11px;font-weight:600;color:#fff}

.pdesc{font-size:9px;font-weight:300;line-height:1.55;color:var(--muted);margin-bottom:10px}

.p-actions{display:flex;gap:6px}
.p-link{flex:1;display:block;padding:7px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;font-size:10px;font-weight:500;color:var(--muted);text-decoration:none;transition:color 0.15s,border-color 0.15s;text-align:center;letter-spacing:0.02em}
.p-link:hover{color:#fff;border-color:var(--border2)}
.p-link.primary{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.p-link.primary:hover{background:rgba(0,232,122,0.18)}

/* ── METRICS PANEL (collapsible, left side) ── */
#metrics{
  position:absolute;bottom:120px;left:22px;z-index:20;
  width:220px;background:var(--surface);
  border:1px solid var(--border);border-radius:6px;
  overflow:hidden;backdrop-filter:blur(14px);
  transition:height 0.3s ease,opacity 0.3s ease;
}
#metrics.collapsed #m-items{display:none}
#metrics.collapsed{border-radius:6px}
.mpanel-hdr{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:border-color 0.2s}
#metrics.collapsed .mpanel-hdr{border-bottom:1px solid transparent}
.mpanel-toggle{margin-left:4px;font-size:10px;color:var(--dim);transition:transform 0.25s ease;display:inline-block}
#metrics.collapsed .mpanel-toggle{transform:rotate(-90deg)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.8s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
.mpanel-title{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.mpanel-time{margin-left:auto;font-size:8px;font-weight:300;color:var(--dim)}
.mitem{padding:7px 12px;border-bottom:1px solid var(--border);animation:fin 0.3s ease}
.mitem:last-child{border-bottom:none}
@keyframes fin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.mlabel{font-size:8px;font-weight:500;color:var(--muted);margin-bottom:2px;letter-spacing:0.04em}
.mval{font-size:12px;font-weight:600;color:#fff;line-height:1.2}
.mval span{color:var(--green)}

/* ── COMPARE BAR ── */
#compare-bar{
  display:none;position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:90;
  background:rgba(10,10,10,0.95);border:1px solid var(--green);border-radius:8px;
  padding:8px 14px;backdrop-filter:blur(14px);
  align-items:center;gap:10px;
}
#compare-bar.visible{display:flex}
.compare-chips{display:flex;gap:6px;flex-wrap:wrap}
.compare-chip{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:4px;
  font-size:9px;color:#fff;font-family:'Poppins',sans-serif;
}
.compare-chip .chip-x{cursor:pointer;color:var(--muted);font-size:11px;margin-left:2px}
.compare-chip .chip-x:hover{color:#fff}
.compare-chip .chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#compare-btn{
  padding:6px 14px;background:var(--green);color:#000;border:none;border-radius:4px;
  font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;cursor:pointer;
  letter-spacing:0.04em;white-space:nowrap;
}
#compare-btn:hover{background:#00ff88}
#compare-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Compare panel */
#compare-panel{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(5,5,5,0.97);backdrop-filter:blur(20px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#compare-panel.open{display:block}
.cp-header{
  position:sticky;top:0;z-index:1;padding:16px 22px;
  background:rgba(10,10,10,0.98);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cp-title{font-size:14px;font-weight:700;color:#fff}
.cp-close{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:12px;padding:6px 12px;cursor:pointer;font-family:'Poppins',sans-serif}
.cp-close:hover{color:#fff;border-color:var(--border2)}
.cp-grid{display:grid;gap:0;padding:0 22px 40px}
.cp-row{display:grid;border-bottom:1px solid var(--border);min-height:38px}
.cp-row.header{position:sticky;top:52px;z-index:1;background:rgba(10,10,10,0.98)}
.cp-cell{padding:10px 12px;font-size:10px;color:#fff;display:flex;align-items:center}
.cp-cell.label{color:var(--muted);font-size:8px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;background:rgba(255,255,255,0.02)}
.cp-cell.name{font-weight:700;font-size:12px}
.cp-cell .cell-tag{
  display:inline-block;padding:2px 7px;border-radius:3px;font-size:8px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
}
.cp-cell.highlight{color:var(--green);font-weight:700}

/* ── AUTHOR ── */
#author{position:absolute;bottom:42px;left:50%;transform:translateX(-50%);z-index:20;text-align:center;pointer-events:none;white-space:nowrap}
.author-name{font-size:10px;font-weight:500;color:var(--dim);letter-spacing:0.04em}
.author-name a{color:var(--green);text-decoration:none;pointer-events:all;transition:color 0.15s}
.author-name a:hover{color:#fff}

/* ── LANGUAGE TOGGLE ── */
#lang-toggle{
  position:absolute;top:14px;right:120px;z-index:22;
  background:rgba(10,10,10,0.85);border:1px solid var(--border);border-radius:4px;
  padding:5px 10px;cursor:pointer;font-family:'Poppins',sans-serif;
  font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.04em;
  backdrop-filter:blur(12px);transition:color 0.15s,border-color 0.15s;
}
#lang-toggle:hover{color:#fff;border-color:var(--border2)}

/* ── CLOCK ── */
#clock{position:absolute;top:14px;right:22px;z-index:21;text-align:right;pointer-events:none}
.clock-time{font-weight:600;font-size:14px;color:var(--green);letter-spacing:0.04em}
.clock-date{font-size:9px;font-weight:300;color:var(--dim);margin-top:1px}

/* ── TICKER ── */
#ticker{position:absolute;bottom:0;left:0;right:0;z-index:20;height:36px;background:rgba(10,10,10,0.97);border-top:1px solid var(--border);display:flex;align-items:center;overflow:hidden}
.ttag{flex-shrink:0;padding:0 14px;font-size:8px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:#000;background:var(--green);height:100%;display:flex;align-items:center}
.ttrack{display:flex;animation:ticker 18s linear infinite;white-space:nowrap;cursor:grab}
#ticker:hover .ttrack{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.titem{font-size:10px;font-weight:400;padding:0 26px;color:var(--muted);display:flex;align-items:center;gap:6px}
.titem strong{color:#fff;font-weight:600}

.mapboxgl-ctrl-attrib,.mapboxgl-ctrl-logo{display:none!important}
.mapboxgl-ctrl-group{background:rgba(10,10,10,0.88)!important;border:1px solid var(--border)!important;border-radius:4px!important}
.mapboxgl-ctrl-group button{background:transparent!important}

/* ── NEWS IN POPUP ── */
.p-news{padding:0 14px 10px}
.p-news-hdr{font-size:7px;font-weight:700;color:var(--green);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.p-news-hdr::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);animation:blink 1.8s ease-in-out infinite}
.p-news-item{padding:6px 0;border-bottom:1px solid var(--border)}
.p-news-item:last-child{border-bottom:none}
.p-news-link{font-size:9px;font-weight:500;color:var(--text);text-decoration:none;line-height:1.4;display:block;transition:color 0.15s}
.p-news-link:hover{color:var(--green)}
.p-news-meta{font-size:7px;color:var(--muted);margin-top:2px}
.p-news-empty{font-size:8px;color:var(--dim);font-style:italic;padding:4px 0}

/* ── MOBILE BOTTOM SHEET ── */
#mobile-sheet{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  max-height:62vh;background:rgba(8,8,8,0.97);
  border-radius:16px 16px 0 0;border-top:1px solid rgba(0,232,122,0.15);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  backdrop-filter:blur(24px);box-shadow:0 -10px 40px rgba(0,0,0,0.6),0 -2px 20px rgba(0,232,122,0.06);
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
#mobile-sheet.open{display:block;transform:translateY(0)}
#mobile-sheet .sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:10px auto 6px}
#mobile-sheet .sheet-close{position:absolute;top:10px;right:14px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:50%;color:#fff;font-size:16px;font-weight:700;cursor:pointer;z-index:2;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;transition:background 0.15s}
#mobile-sheet .sheet-close:hover{background:rgba(255,255,255,0.2)}
#mobile-sheet .p-img-wrap{height:140px;border-radius:0}
#mobile-sheet .ptag{font-size:8px;padding:8px 16px}
#mobile-sheet .pbody{padding:2px 16px 16px}
#mobile-sheet .pname{font-size:16px;margin-bottom:8px}
#mobile-sheet .p-insight{font-size:11px;padding:8px 12px;line-height:1.55;margin-bottom:10px}
#mobile-sheet .pmeta{gap:4px 10px;margin-bottom:12px}
#mobile-sheet .pmk{font-size:8px}
#mobile-sheet .pmv{font-size:12px}
#mobile-sheet .p-actions{gap:6px}
#mobile-sheet .p-link{padding:10px;font-size:10px;border-radius:5px}
#mobile-sheet .p-news{padding:0 16px 16px}
#mobile-sheet .p-news-hdr{font-size:8px}
#mobile-sheet .p-news-link{font-size:10px}
#mobile-sheet .p-news-meta{font-size:8px}

/* ── MOBILE ── */
@media(max-width:600px){
  #header{padding:10px 14px 0}
  .brand{font-size:17px}
  .back-link{font-size:9px}
  #statsbar{top:58px;left:14px;right:14px;flex-wrap:wrap;gap:0}
  .sblock{padding-right:12px;margin-right:12px}
  .sval{font-size:14px}
  .slabel{font-size:8px}
  #filters{top:94px;left:14px;gap:2px}
  .filter-btn{padding:5px 9px;font-size:11px}
  .fcount{font-size:9px;padding-left:8px}
  #filter-expand{display:flex}
  #clock{top:10px;right:14px}
  .clock-time{font-size:12px}
  #lang-toggle{top:10px;right:80px;font-size:9px;padding:4px 8px}

  /* Hide default Mapbox popup on mobile — use bottom sheet instead */
  .mapboxgl-popup{display:none!important}

  /* Intel Feed */
  #metrics{width:170px;bottom:110px;left:14px}
  #metrics.collapsed #m-items{display:none}
  #metrics.collapsed .mpanel-toggle{transform:rotate(-90deg)}
  #metrics.collapsed .mpanel-hdr{border-bottom:1px solid transparent}

  #author{bottom:36px}
  #author .author-name{font-size:8px}
  #ticker{height:30px}
  .ttag{font-size:6px;padding:0 10px}
  .titem{font-size:8px;padding:0 18px}

  /* List panel — full width on mobile */
  #list-panel{width:100%;border-right:none}
  #list-toggle{padding:5px 9px;font-size:11px}
  .lp-item{padding:10px 16px}
  .lp-search{margin:10px 12px;font-size:12px}

  /* Compare panel — vertical cards on mobile */
  .cp-grid{padding:0 14px 40px}
  .cp-grid.mobile-cards{display:flex;flex-direction:column;gap:16px}
  .cp-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;overflow:hidden}

// Make ticker touch-scrollable
(function(){
  const ticker=document.getElementById('ticker');
  const track=document.getElementById('ttrack');
  let dragging=false,startX=0,scrollLeft=0;
  ticker.addEventListener('touchstart',e=>{
    dragging=true;track.style.animationPlayState='paused';
    startX=e.touches[0].pageX;
    const t=getComputedStyle(track).transform;
    const m=t.match(/matrix.*\((.+)\)/);
    scrollLeft=m?parseFloat(m[1].split(',')[4]):0;
  },{passive:true});
  ticker.addEventListener('touchmove',e=>{
    if(!dragging) return;
    const dx=e.touches[0].pageX-startX;
    track.style.transform=`translateX(${scrollLeft+dx}px)`;
  },{passive:true});
  ticker.addEventListener('touchend',()=>{
    dragging=false;track.style.animationPlayState='running';track.style.transform='';
  });
})();

    requestAnimationFrame(animatePulse);
  }
  animatePulse();

  updateCounts(); setActive('all');
  window._mapLoaded=true;
});

  });
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>applyFilter(btn.dataset.sector));
});

// ── LIST PANEL ──
const SECTOR_ORDER=['sports','realestate','hospitality','culture','transport','energy'];
function toggleListPanel(){
  const panel=document.getElementById('list-panel');
  if(panel.classList.contains('open')){closeListPanel();return;}
  panel.classList.add('open');
  renderListPanel();
}
function closeListPanel(){
  document.getElementById('list-panel').classList.remove('open');
  document.getElementById('lp-search').value='';
}
function renderListPanel(){
  const query=(document.getElementById('lp-search').value||'').toLowerCase().trim();
  const sector=activeFilter||'all';
  const isAr=currentLang==='ar';
  const filtered=PROJECTS.filter(p=>{
    if(sector!=='all'&&p.sector!==sector) return false;
    if(query){
      const name=isAr&&p.nameAr?p.nameAr:p.name;
      return name.toLowerCase().includes(query)||p.value.toLowerCase().includes(query)||p.status.toLowerCase().includes(query);
    }
    return true;
  });
  // Group by sector
  const groups={};
  filtered.forEach(p=>{
    if(!groups[p.sector]) groups[p.sector]=[];
    groups[p.sector].push(p);
  });
  const sLabels=SECTOR_LABELS;
  let html='';
  SECTOR_ORDER.forEach(s=>{
    if(!groups[s]) return;
    const c=COLORS[s];
    html+=`<div class="lp-sector-group">`;
    html+=`<div class="lp-sector-hdr" style="color:${c}">${EMOJI[s]} ${sLabels[s]||s} <span style="opacity:0.4;font-weight:400">(${groups[s].length})</span></div>`;
    groups[s].forEach(p=>{
      const name=isAr&&p.nameAr?p.nameAr:p.name;
      html+=`<div class="lp-item" onclick="selectFromList(${p.id})">
        <div class="lp-item-dot" style="background:${c}"></div>
        <div class="lp-item-info"><div class="lp-item-name">${name}</div><div class="lp-item-meta">${p.status} · ${p.completion}</div></div>
        <div class="lp-item-val">${p.value}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('lp-body').innerHTML=html;
  const title=isAr?(sector==='all'?'جميع المشاريع':(sLabels[sector]||sector)):(sector==='all'?'All Projects':(sLabels[sector]||sector));
  document.getElementById('lp-title').textContent=title;
  document.getElementById('lp-count').textContent=isAr?`${filtered.length} مشروع`:`${filtered.length} projects`;
}
function selectFromList(id){
  const p=PROJECTS.find(x=>x.id===id);if(!p) return;
  closeListPanel();
  clearSelection();
  activeProjectId=p.id;
  map.setFeatureState({source:'projects',id:p.id},{selected:true});
  map.flyTo({center:[p.lng,p.lat],zoom:12,pitch:45,duration:1200,essential:true});
  setTimeout(()=>{
    if(window.innerWidth<=600){
      document.getElementById('sheet-content').innerHTML=popupHTML(p);
      document.getElementById('mobile-sheet').classList.add('open');
      document.getElementById('metrics').classList.add('collapsed');
    } else {
      if(activePopup) activePopup.remove();
      activePopup=new mapboxgl.Popup({closeButton:true,maxWidth:'340px',offset:18})
        .setLngLat([p.lng,p.lat]).setHTML(popupHTML(p)).addTo(map);
      activePopup.on('close',()=>{activePopup=null;clearSelection();});
    }
  },800);
}

map.addControl(new mapboxgl.NavigationControl({showCompass:true}),'bottom-left');

// Auto-collapse feed and filters on mobile
if(window.innerWidth<=600){
  document.getElementById('metrics').classList.add('collapsed');
  document.getElementById('filters').classList.add('collapsed');
}

// ── COMPARISON TOOL ──
let compareList = [];

function addToCompare(id){
  if(compareList.includes(id)) return;
  if(compareList.length>=3){ alert('Max 3 projects. Remove one first.'); return; }
  compareList.push(id);
  updateCompareBar();
  if(activePopup){activePopup.remove();activePopup=null;}
  closeMobileSheet();
}

function removeFromCompare(id){
  compareList=compareList.filter(i=>i!==id);
  updateCompareBar();
}

function updateCompareBar(){
  const bar=document.getElementById('compare-bar');
  const chips=document.getElementById('compare-chips');
  const btn=document.getElementById('compare-btn');
  if(compareList.length===0){ bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  chips.innerHTML=compareList.map(id=>{
    const p=PROJECTS.find(x=>x.id===id);
    const c=COLORS[p.sector]||'#fff';
    return `<div class="compare-chip">
      <span class="chip-dot" style="background:${c}"></span>
      ${p.name.length>25?p.name.slice(0,25)+'…':p.name}
      <span class="chip-x" onclick="removeFromCompare(${id})">✕</span>
    </div>`;
  }).join('');
  btn.disabled=compareList.length<2;
}

function openCompare(){
  if(compareList.length<2) return;
  const projects=compareList.map(id=>PROJECTS.find(x=>x.id===id));
  const grid=document.getElementById('cp-grid');
  const isMobile=window.innerWidth<=600;

  const fields=[
    {label:'Sector',key:'sector',format:v=>SECTOR_LABELS[v]||v},
    {label:'Investment',key:'value'},
    {label:'GDP Contribution',key:'gdp'},
    {label:'Jobs Created',key:'jobs'},
    {label:'Status',key:'status',tag:true},
    {label:'Completion',key:'completion'},
    {label:'Phase',key:'phase'},
    {label:'Contractor',key:'contractor'},
  ];

  let html='';

  if(isMobile){
    // Card layout — one card per project, stacked vertically
    grid.className='cp-grid mobile-cards';
    grid.style.gridTemplateColumns='';
    projects.forEach(p=>{
      const c=COLORS[p.sector]||'#fff';
      html+=`<div class="cp-card">`;
      html+=`<div class="cp-card-name" style="color:${c}">${p.name}</div>`;
      fields.forEach(f=>{
        let val=p[f.key]||'—';
        if(f.format) val=f.format(val);
        if(f.tag){
          const tc=val.includes('Under')?'#FFB800':val.includes('Operational')?'#00E87A':'#6aa2f0';
          html+=`<div class="cp-card-row"><span class="cp-card-label">${f.label}</span><span class="cp-card-val"><span class="cell-tag" style="background:${tc}22;color:${tc}">${val}</span></span></div>`;
        } else {
          html+=`<div class="cp-card-row"><span class="cp-card-label">${f.label}</span><span class="cp-card-val">${val}</span></div>`;
        }
      });
      html+=`</div>`;
    });
  } else {
    // Desktop: grid table
    grid.className='cp-grid';
    grid.style.gridTemplateColumns=`120px repeat(${projects.length},1fr)`;
    const rows=[{label:'Project',key:'name',isHeader:true},...fields];
    rows.forEach(row=>{
      const cls=row.isHeader?'cp-row header':'cp-row';
      html+=`<div class="${cls}" style="grid-template-columns:120px repeat(${projects.length},1fr)">`;
      html+=`<div class="cp-cell label">${row.label}</div>`;
      projects.forEach(p=>{
        let val=p[row.key]||'—';
        if(row.format) val=row.format(val);
        if(row.isHeader){
          const c=COLORS[p.sector]||'#fff';
          html+=`<div class="cp-cell name" style="color:${c}">${val}</div>`;
        } else if(row.tag){
          const c=val.includes('Under')?'#FFB800':val.includes('Operational')?'#00E87A':'#6aa2f0';
          html+=`<div class="cp-cell"><span class="cell-tag" style="background:${c}22;color:${c}">${val}</span></div>`;
        } else {
          html+=`<div class="cp-cell">${val}</div>`;
        }
      });
      html+=`</div>`;
    });
  }

  grid.innerHTML=html;
  document.getElementById('compare-panel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeCompare(){
  document.getElementById('compare-panel').classList.remove('open');
  document.body.style.overflow='';
}
</script>
