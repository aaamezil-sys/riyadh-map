<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--surface:rgba(12,12,12,0.92);
  --green:#00E87A;--green-dim:rgba(0,232,122,0.10);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#FFFFFF;--muted:#888;--dim:#444;
  --sports:#F59E0B;--hospitality:#38BDF8;--culture:#E879F9;
  --transport:#34D399;--realestate:#FB923C;--energy:#EF4444;
}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#map{position:absolute;inset:0}

/* ── HEADER ── */
#header{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding:14px 22px 0;
  background:linear-gradient(to bottom,rgba(10,10,10,0.98) 60%,transparent);
  pointer-events:none;
}
.back-link{font-size:10px;font-weight:400;color:var(--dim);text-decoration:none;pointer-events:all;display:inline-flex;align-items:center;gap:4px;transition:color 0.15s;margin-bottom:4px;letter-spacing:0.02em}
.back-link:hover{color:var(--green)}
.brand{font-weight:800;font-size:18px;line-height:1;color:#fff;letter-spacing:-0.02em}
.brand em{color:var(--green);font-style:normal}

/* ── STATS BAR ── */
#statsbar{
  position:absolute;top:70px;left:22px;right:22px;z-index:20;
  display:flex;gap:0;pointer-events:none;
}
.sblock{display:flex;flex-direction:column;gap:1px;padding-right:20px;margin-right:20px;border-right:1px solid var(--border)}
.sblock:last-child{border-right:none}
.sval{font-weight:700;font-size:14px;color:#fff}
.sval.green{color:var(--green)}
.slabel{font-size:8px;font-weight:400;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase}

/* ── FILTERS ── */
#filters{position:absolute;top:108px;left:22px;z-index:20;display:flex;flex-direction:column;gap:3px}
.filter-label{font-size:8px;font-weight:600;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.filter-btn{
  display:flex;align-items:center;gap:8px;padding:6px 11px;
  background:rgba(10,10,10,0.84);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;font-family:'Poppins',sans-serif;font-size:10px;font-weight:500;
  color:var(--muted);transition:border-color 0.15s,color 0.15s;
  backdrop-filter:blur(12px);white-space:nowrap;
}
.filter-btn:hover{color:#fff;border-color:var(--border2)}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fcount{margin-left:auto;padding-left:12px;font-size:9px;opacity:0.35}

/* ── POPUP ── */
.mapboxgl-popup{max-width:330px!important}
.mapboxgl-popup-content{
  background:rgba(10,10,10,0.98)!important;border:1px solid var(--border)!important;
  border-radius:8px!important;padding:0!important;
  box-shadow:0 28px 70px rgba(0,0,0,0.9)!important;
  backdrop-filter:blur(24px);overflow:hidden;
}
.mapboxgl-popup-tip{display:none!important}
.mapboxgl-popup-close-button{color:var(--muted)!important;font-size:16px!important;padding:8px 10px!important;background:transparent!important;z-index:2;position:relative}
.mapboxgl-popup-close-button:hover{color:#fff!important;background:transparent!important}

/* POPUP INTERNALS */
.p-img-wrap{position:relative;width:100%;height:140px;overflow:hidden;background:#111}
.p-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
.p-img:hover{transform:scale(1.04)}
.p-img-fallback{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:32px;
}
.p-img-overlay{
  position:absolute;bottom:0;left:0;right:0;height:50%;
  background:linear-gradient(to top,rgba(10,10,10,1),transparent);
}
.ptag{padding:7px 14px;font-size:7px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase}
.pbody{padding:2px 14px 14px}
.pname{font-weight:700;font-size:13px;line-height:1.3;color:#fff;margin-bottom:8px}
.phr{height:1px;background:var(--border);margin-bottom:9px}

/* insight block */
.p-insight{padding:8px 11px;border-left:2px solid;font-size:9px;font-weight:400;line-height:1.55;margin-bottom:8px}

.pmeta{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-bottom:10px}
.pm{display:flex;flex-direction:column;gap:1px}
.pmk{font-size:7px;font-weight:400;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
.pmv{font-size:10px;font-weight:600;color:#fff}

.pdesc{font-size:9px;font-weight:300;line-height:1.55;color:var(--muted);margin-bottom:10px}

.p-actions{display:flex;gap:6px}
.p-link{flex:1;display:block;padding:7px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;font-size:9px;font-weight:500;color:var(--muted);text-decoration:none;transition:color 0.15s,border-color 0.15s;text-align:center;letter-spacing:0.02em}
.p-link:hover{color:#fff;border-color:var(--border2)}
.p-link.primary{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.p-link.primary:hover{background:rgba(0,232,122,0.18)}

/* ── METRICS PANEL (collapsible, left side) ── */
#metrics{
  position:absolute;bottom:120px;left:22px;z-index:20;
  width:220px;background:var(--surface);
  border:1px solid var(--border);border-radius:6px;
  overflow:hidden;backdrop-filter:blur(14px);
  transition:height 0.3s ease,opacity 0.3s ease;
}
#metrics.collapsed #m-items{display:none}
#metrics.collapsed{border-radius:6px}
.mpanel-hdr{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:border-color 0.2s}
#metrics.collapsed .mpanel-hdr{border-bottom:1px solid transparent}
.mpanel-toggle{margin-left:4px;font-size:10px;color:var(--dim);transition:transform 0.25s ease;display:inline-block}
#metrics.collapsed .mpanel-toggle{transform:rotate(-90deg)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.8s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
.mpanel-title{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.mpanel-time{margin-left:auto;font-size:8px;font-weight:300;color:var(--dim)}
.mitem{padding:7px 12px;border-bottom:1px solid var(--border);animation:fin 0.3s ease}
.mitem:last-child{border-bottom:none}
@keyframes fin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.mlabel{font-size:7px;font-weight:500;color:var(--muted);margin-bottom:2px;letter-spacing:0.04em}
.mval{font-size:11px;font-weight:600;color:#fff;line-height:1.2}
.mval span{color:var(--green)}

/* ── AUTHOR ── */
#author{position:absolute;bottom:50px;right:22px;z-index:20;text-align:right;pointer-events:none}
.author-name{font-size:9px;font-weight:500;color:var(--dim);letter-spacing:0.04em}
.author-name a{color:var(--green);text-decoration:none;pointer-events:all;transition:color 0.15s}
.author-name a:hover{color:#fff}

/* ── CLOCK ── */
#clock{position:absolute;top:14px;right:22px;z-index:21;text-align:right;pointer-events:none}
.clock-time{font-weight:600;font-size:13px;color:var(--green);letter-spacing:0.04em}
.clock-date{font-size:8px;font-weight:300;color:var(--dim);margin-top:1px}

/* ── TICKER ── */
#ticker{position:absolute;bottom:0;left:0;right:0;z-index:20;height:36px;background:rgba(10,10,10,0.97);border-top:1px solid var(--border);display:flex;align-items:center;overflow:hidden}
.ttag{flex-shrink:0;padding:0 14px;font-size:7px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:#000;background:var(--green);height:100%;display:flex;align-items:center}
.ttrack{display:flex;animation:ticker 55s linear infinite;white-space:nowrap}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.titem{font-size:9px;font-weight:400;padding:0 26px;color:var(--muted);display:flex;align-items:center;gap:6px}
.titem strong{color:#fff;font-weight:600}

.mapboxgl-ctrl-attrib,.mapboxgl-ctrl-logo{display:none!important}
.mapboxgl-ctrl-group{background:rgba(10,10,10,0.88)!important;border:1px solid var(--border)!important;border-radius:4px!important}

.p-news{padding:0 14px 10px}

.p-news-item{padding:6px 0;border-bottom:1px solid var(--border)}

.p-news-link{font-size:9px;font-weight:500;color:var(--text);text-decoration:none;line-height:1.4;display:block;transition:color 0.15s}
.p-news-link:hover{color:var(--green)}

.p-news-empty{font-size:8px;color:var(--dim);font-style:italic;padding:4px 0}

/* ── MOBILE: start feed collapsed ── */
@media(max-width:600px){
  #metrics{width:190px}
  #metrics.collapsed-mobile #m-items{display:none}
  #metrics.collapsed-mobile .mpanel-toggle{transform:rotate(-90deg)}
  #metrics.collapsed-mobile .mpanel-hdr{border-bottom:1px solid transparent}
  #author{bottom:46px;right:12px}
  #author .author-name{font-size:8px}
}
</style>
</head>

// ── CLOCK ──
function updateClock(){
  const r=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Riyadh'}));
  document.getElementById('clock-time').textContent=[r.getHours(),r.getMinutes(),r.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  document.getElementById('clock-date').textContent=r.toLocaleDateString('en-US',{timeZone:'Asia/Riyadh',weekday:'short',month:'short',day:'numeric'})+' · AST';
}
setInterval(updateClock,1000); updateClock();
document.getElementById('s-days').textContent=Math.ceil((new Date('2030-01-01')-new Date())/86400000).toLocaleString();

// ── TICKER ──
document.getElementById('ttrack').innerHTML=[...TICKER,...TICKER].map(t=>`<div class="titem">${t}<span style="color:var(--dim);padding:0 4px">·</span></div>`).join('');

// ── FEED ──
let fi=0;
function rotateFeed(){
  const slice=[]; for(let i=0;i<4;i++) slice.push(FEED[(fi+i)%FEED.length]);
  document.getElementById('m-items').innerHTML=slice.map(e=>`<div class="mitem"><div class="mlabel">${e.label}</div><div class="mval">${e.val}</div></div>`).join('');
  fi=(fi+1)%FEED.length;
  document.getElementById('m-time').textContent=new Date().toLocaleTimeString('en-US',{timeZone:'Asia/Riyadh',hour:'2-digit',minute:'2-digit'})+' AST';
}
rotateFeed(); setInterval(rotateFeed,4500);

// ── COUNTS ──
function updateCounts(sector='all'){
  const counts={};
  PROJECTS.forEach(p=>{counts[p.sector]=(counts[p.sector]||0)+1;});
  const visible=sector==='all'?PROJECTS.length:PROJECTS.filter(p=>p.sector===sector).length;
  document.getElementById('s-projects').textContent=visible;
  document.getElementById('c-all').textContent=PROJECTS.length;
  Object.entries(counts).forEach(([s,n])=>{const el=document.getElementById(`c-${s}`);if(el)el.textContent=n;});
}
updateCounts();

function popupHTML(p){
  const c=COLORS[p.sector];

  let imgSection;
  if(p.image){
    imgSection=`<div class="p-img-wrap">
      <img class="p-img" src="${p.image}" alt="${p.name}" loading="lazy"
        onerror="this.parentNode.innerHTML='<div class=\\'p-img-fallback\\' style=\\'background:${c}18\\'>${EMOJI[p.sector]||'📍'}</div>'">
      <div class="p-img-overlay"></div>
    </div>`;
  } else {
    imgSection=`<div class="p-img-wrap"><div class="p-img-fallback" style="background:${c}15;height:70px">${EMOJI[p.sector]||'📍'}</div></div>`;
  }

  return `
    ${imgSection}
    <div class="ptag" style="background:${c}18;color:${c}">${SECTOR_LABELS[p.sector]||p.sector} · Vision 2030</div>
    <div class="pbody">
      <div class="pname">${p.name}</div>
      <div class="p-insight" style="background:${c}10;border-color:${c};color:${c}">${p.description}</div>
      <div class="phr"></div>
      <div class="pmeta">
        <div class="pm"><div class="pmk">Investment</div><div class="pmv" style="color:${c}">${p.value}</div></div>
        <div class="pm"><div class="pmk">GDP Contribution</div><div class="pmv">${p.gdp}</div></div>
        <div class="pm"><div class="pmk">Jobs</div><div class="pmv">${p.jobs}</div></div>
        <div class="pm"><div class="pmk">Status</div><div class="pmv">${p.status}</div></div>
        <div class="pm"><div class="pmk">Completion</div><div class="pmv">${p.completion}</div></div>
        <div class="pm"><div class="pmk">Phase</div><div class="pmv">${p.phase}</div></div>
      </div>
      <div class="p-actions">
        ${p.link?`<a class="p-link primary" href="${p.link}" target="_blank" rel="noopener">↗ Official Source</a>`:''}
        <a class="p-link" href="https://www.google.com/maps?q=${p.lat},${p.lng}" target="_blank" rel="noopener">📍 Maps</a>
      </div>
    </div>
    ${newsHTML(p.id)}`;
}

function newsHTML(id){
  const articles = NEWS_DATA[id];
  if(!articles || !articles.length) return '';
  return `<div class="p-news">
    <div class="p-news-hdr">Latest Intel</div>
    ${articles.map(a=>`<div class="p-news-item">
      <a class="p-news-link" href="${a.link}" target="_blank" rel="noopener">${a.title}</a>
      <div class="p-news-meta">${a.source}${a.date?' · '+a.date:''}</div>
    </div>`).join('')}
  </div>`;
}

const map=new mapboxgl.Map({
  container:'map', style:'mapbox://styles/mapbox/dark-v11',
  center:[44.5,26.0], zoom:5.2, pitch:28, bearing:-4, antialias:true
});

let activeFilter='all';
let hoveredId=null;
let activePopup=null;
let activeProjectId=null;

function buildGeoJSON(sector){
  return{type:'FeatureCollection',features:PROJECTS.filter(p=>sector==='all'||p.sector===sector).map(p=>({
    type:'Feature', id:p.id,
    geometry:{type:'Point',coordinates:[p.lng,p.lat]},
    properties:{id:p.id,sector:p.sector,name:p.name,color:COLORS[p.sector]}
  }))};
}

map.on('load',()=>{
  map.setFog({color:'rgb(10,10,10)','high-color':'rgb(12,14,20)','horizon-blend':0.015,'space-color':'rgb(4,4,6)','star-intensity':0.55});

  map.addSource('projects',{type:'geojson',data:buildGeoJSON('all'),promoteId:'id'});

  // Pulse glow — only on hovered
  map.addLayer({id:'glow',type:'circle',source:'projects',paint:{
    'circle-radius':['case',['boolean',['feature-state','hover'],false],22,0],
    'circle-color':['get','color'],
    'circle-opacity':0.15,
    'circle-blur':0.5,
  }});

  // Outer ring
  map.addLayer({id:'ring',type:'circle',source:'projects',paint:{
    'circle-radius':['case',['boolean',['feature-state','hover'],false],11,8],
    'circle-color':'transparent',
    'circle-stroke-width':['case',['boolean',['feature-state','hover'],false],2,1],
    'circle-stroke-color':['get','color'],
    'circle-stroke-opacity':['case',['boolean',['feature-state','hover'],false],0.8,0.3],
  }});

  // Core dot
  map.addLayer({id:'dot',type:'circle',source:'projects',paint:{
    'circle-radius':['case',['boolean',['feature-state','hover'],false],6,5],
    'circle-color':['get','color'],
    'circle-opacity':1,
    'circle-stroke-width':1.5,
    'circle-stroke-color':'rgba(10,10,10,0.7)',
  }});

  // Hover — feature-state on individual feature only
  map.on('mousemove','dot',e=>{
    map.getCanvas().style.cursor='pointer';
    if(e.features.length>0){
      const id=e.features[0].id;
      if(hoveredId!==null&&hoveredId!==id) map.setFeatureState({source:'projects',id:hoveredId},{hover:false});
      hoveredId=id;
      map.setFeatureState({source:'projects',id:hoveredId},{hover:true});
    }
  });
  map.on('mouseleave','dot',()=>{
    map.getCanvas().style.cursor='';
    if(hoveredId!==null){map.setFeatureState({source:'projects',id:hoveredId},{hover:false});hoveredId=null;}
  });

  // Click
  map.on('click','dot',e=>{
    if(!e.features.length) return;
    const fid=Number(e.features[0].id);
    const p=PROJECTS.find(x=>x.id===fid); if(!p) return;
    activeProjectId=p.id;
    const coords=e.features[0].geometry.coordinates.slice();
    if(activePopup) activePopup.remove();
    activePopup=new mapboxgl.Popup({closeButton:true,maxWidth:'330px',offset:16})
      .setLngLat(coords).setHTML(popupHTML(p)).addTo(map);
    activePopup.on('close',()=>{activePopup=null;activeProjectId=null;});
  });

  updateCounts(); setActive('all');
});

// ── FILTER ──
function applyFilter(sector,fly=true){
  activeFilter=sector; hoveredId=null;
  if(activePopup){activePopup.remove();activePopup=null;}
  if(map.getSource('projects')) map.getSource('projects').setData(buildGeoJSON(sector));
  updateCounts(sector); setActive(sector);
  if(!fly) return;
  const ft={
    all:{center:[44.5,26.0],zoom:5.2,pitch:28},
    sports:{center:[46.50,24.55],zoom:8.8,pitch:48},
    realestate:{center:[44.0,25.5],zoom:5.5,pitch:36},
    hospitality:{center:[37.0,25.8],zoom:5.4,pitch:40},
    culture:{center:[46.60,24.62],zoom:9.0,pitch:48},
    transport:{center:[46.72,24.82],zoom:8.8,pitch:44},
    energy:{center:[46.5,25.5],zoom:5.8,pitch:36},
  };
  map.flyTo({...(ft[sector]||ft.all),duration:1300,essential:true});
}

function setActive(sector){
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    const s=btn.dataset.sector;
    const c=s==='all'?'#00E87A':COLORS[s];
    btn.style.borderColor=s===sector?c:'';
    btn.style.color=s===sector?c:'';
  });
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>applyFilter(btn.dataset.sector));
});

map.addControl(new mapboxgl.NavigationControl({showCompass:true}),'bottom-left');

// Auto-collapse feed on mobile
if(window.innerWidth<=600) document.getElementById('metrics').classList.add('collapsed');
</script>
</body>
